name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: NuGet package version to build.
        required: true
        default: 0.1.0-preview.25
      publish:
        description: Push packages to NuGet.org after validation.
        required: true
        type: boolean
        default: false
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  portable:
    name: Validate and pack portable packages
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Linux WebGPU dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan1 \
            mesa-vulkan-drivers \
            libx11-xcb1 \
            libxcb1 \
            libxcb-randr0 \
            libxcb-render0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-xfixes0 \
            libxcb-present0 \
            libxkbcommon0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi
          echo "PROGPU_PACKAGE_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "Resolved ProGPU package version: ${version}"

      - name: Verify docs and package manifest
        run: ./eng/progpu-verify-docs.sh

      - name: Restore
        run: |
          dotnet restore src/ProGPU.Tests/ProGPU.Tests.csproj --runtime linux-x64
          dotnet restore src/ProGPU.Tests.Headless/ProGPU.Tests.Headless.csproj --runtime linux-x64

      - name: Build tests
        run: |
          dotnet build src/ProGPU.Tests/ProGPU.Tests.csproj --configuration Release --runtime linux-x64 --no-restore -p:ContinuousIntegrationBuild=true -p:Version=${{ env.PROGPU_PACKAGE_VERSION }} -p:PackageVersion=${{ env.PROGPU_PACKAGE_VERSION }}
          dotnet build src/ProGPU.Tests.Headless/ProGPU.Tests.Headless.csproj --configuration Release --runtime linux-x64 --no-restore -p:ContinuousIntegrationBuild=true -p:Version=${{ env.PROGPU_PACKAGE_VERSION }} -p:PackageVersion=${{ env.PROGPU_PACKAGE_VERSION }}

      - name: Test
        shell: bash
        run: |
          native_root="${GITHUB_WORKSPACE}/src/ProGPU.Tests/bin/Release/net10.0/linux-x64"
          native_rid_root="${native_root}/runtimes/linux-x64/native"
          headless_native_root="${GITHUB_WORKSPACE}/src/ProGPU.Tests.Headless/bin/Release/net10.0/linux-x64"
          headless_native_rid_root="${headless_native_root}/runtimes/linux-x64/native"
          export LD_LIBRARY_PATH="${native_root}:${native_rid_root}:${headless_native_root}:${headless_native_rid_root}:${LD_LIBRARY_PATH:-}"
          # Match the green Linux Build lane: Mesa software execution does not
          # complete the GPU shaping contract suite in practical hosted-CI time.
          # The complete contract remains a local hardware validation.
          dotnet test src/ProGPU.Tests/ProGPU.Tests.csproj --configuration Release --runtime linux-x64 --no-build --verbosity normal --filter "FullyQualifiedName!~ShapingContractsTests"
          dotnet test src/ProGPU.Tests.Headless/ProGPU.Tests.Headless.csproj --configuration Release --runtime linux-x64 --no-build --verbosity normal

      - name: Pack portable packages
        run: PROGPU_PACKAGE_GROUP=portable ./eng/progpu-pack.sh

      - name: Upload portable packages
        uses: actions/upload-artifact@v7
        with:
          name: progpu-portable-${{ env.PROGPU_PACKAGE_VERSION }}
          path: |
            artifacts/packages/Release/*.nupkg
            artifacts/packages/Release/*.snupkg
          if-no-files-found: error

  mobile:
    name: Pack mobile packages
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi
          echo "PROGPU_PACKAGE_VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Verify package manifest
        run: ./eng/progpu-verify-package-list.sh

      - name: Restore mobile workloads
        run: |
          dotnet workload restore src/ProGPU.Android/ProGPU.Android.csproj --skip-manifest-update
          dotnet workload restore src/ProGPU.iOS/ProGPU.iOS.csproj --skip-manifest-update

      - name: Pack mobile packages
        run: PROGPU_PACKAGE_GROUP=mobile PROGPU_PACKAGE_OUTPUT=artifacts/packages-mobile/Release ./eng/progpu-pack.sh

      - name: Upload mobile packages
        uses: actions/upload-artifact@v7
        with:
          name: progpu-mobile-${{ env.PROGPU_PACKAGE_VERSION }}
          path: |
            artifacts/packages-mobile/Release/*.nupkg
            artifacts/packages-mobile/Release/*.snupkg
          if-no-files-found: error

  publish:
    name: Verify and publish complete release
    needs: [portable, mobile]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi
          echo "PROGPU_PACKAGE_VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Download portable packages
        uses: actions/download-artifact@v8
        with:
          name: progpu-portable-${{ env.PROGPU_PACKAGE_VERSION }}
          path: artifacts/packages/Release

      - name: Download mobile packages
        uses: actions/download-artifact@v8
        with:
          name: progpu-mobile-${{ env.PROGPU_PACKAGE_VERSION }}
          path: artifacts/packages/Release

      - name: Verify complete package set and dependency closure
        run: PROGPU_PACKAGE_GROUP=all ./eng/progpu-verify-packages.sh

      - name: Upload complete NuGet release
        uses: actions/upload-artifact@v7
        with:
          name: progpu-nuget-${{ env.PROGPU_PACKAGE_VERSION }}
          path: |
            artifacts/packages/Release/*.nupkg
            artifacts/packages/Release/*.snupkg
          if-no-files-found: error

      - name: Publish to NuGet.org
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish) || startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          for package in artifacts/packages/Release/*.nupkg; do
            if [[ "${package}" == *.snupkg ]]; then
              continue
            fi
            dotnet nuget push "${package}" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_args=()
          if [[ "${PROGPU_PACKAGE_VERSION}" == *-* ]]; then
            release_args+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" \
            artifacts/packages/Release/*.nupkg \
            artifacts/packages/Release/*.snupkg \
            --repo "${GITHUB_REPOSITORY}" \
            --title "ProGPU ${{ env.PROGPU_PACKAGE_VERSION }}" \
            --generate-notes \
            --verify-tag \
            "${release_args[@]}"
