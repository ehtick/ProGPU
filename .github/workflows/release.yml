name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: NuGet package version to build.
        required: true
        default: 0.1.0-preview.1
      publish:
        description: Push packages to NuGet.org after validation.
        required: true
        type: boolean
        default: false
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  nuget:
    name: Build NuGet release
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi
          echo "PROGPU_PACKAGE_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "Resolved ProGPU package version: ${version}"

      - name: Verify docs
        run: ./eng/progpu-verify-docs.sh

      - name: Restore
        run: dotnet restore src/ProGPU.Tests/ProGPU.Tests.csproj

      - name: Build tests
        run: dotnet build src/ProGPU.Tests/ProGPU.Tests.csproj --configuration Release --no-restore -p:ContinuousIntegrationBuild=true -p:Version=${{ env.PROGPU_PACKAGE_VERSION }} -p:PackageVersion=${{ env.PROGPU_PACKAGE_VERSION }}

      - name: Test
        run: dotnet test src/ProGPU.Tests/ProGPU.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Pack
        run: ./eng/progpu-pack.sh

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: progpu-nuget-${{ env.PROGPU_PACKAGE_VERSION }}
          path: |
            artifacts/packages/Release/*.nupkg
            artifacts/packages/Release/*.snupkg

      - name: Publish to NuGet.org
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish) || startsWith(github.ref, 'refs/tags/v') }}
        run: |
          dotnet nuget push artifacts/packages/Release/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push artifacts/packages/Release/*.snupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
