name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore src/ProGPU.Tests/ProGPU.Tests.csproj

      - name: Build tests
        run: dotnet build src/ProGPU.Tests/ProGPU.Tests.csproj --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test src/ProGPU.Tests/ProGPU.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Pack shipping packages
        shell: bash
        run: PROGPU_PACKAGE_VERSION=11.0.0-ci.${{ github.run_number }} ./eng/progpu-pack.sh
